site_name: QIm
site_author: 'Chen ZongYan'
site_description: 'Qt 4 ImGui'
repo_url: https://github.com/czyt1988/QIm
repo_name: QIm-github

# 多语言站点信息
extra:
  site_name:
    zh: QIm
    en: QIm
    
# 主题
theme:
  name: material
  language: zh
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-4
        name: 切换浅色
    - scheme: slate
      toggle:
        icon: material/brightness-7
        name: 切换深色
  features:
    - navigation.sections # 侧边栏章节可折叠
    - navigation.top # 右下角“回到顶部”按钮
    - navigation.path # 顶部面包屑导航条
    - navigation.expand        # 默认展开全部章节，一眼看到整本书
    - navigation.indexes       # 允许章节首页可点击
    - navigation.footer  # 底部导航条
    - content.code.copy # 代码块右上角出现“复制”按钮
    - content.code.annotate # 代码块行内注释气泡
    - search.suggest # 搜索框实时联想补全
    - search.highlight # 点击结果后正文高亮匹配关键词
    - search.share # 支持复制带关键词的搜索链接
    - toc.follow # 滚动时自动跟随当前章节

# 插件配置
plugins:
  - search
  - i18n:
      languages:
        - locale: zh
          name: 中文
          default: true
          build: true
          # 中文导航配置
          nav:
            - 概述: 
                - QIm简介: zh/index.md
            - 核心概念:
                - 渲染节点: zh/render-node.md
                - 对象树: zh/object-tree.md
                - PIMPL模式: zh/pimpl-pattern.md
                - 信号槽: zh/signal-slot.md
                - 属性系统: zh/property-system.md
            - 2D绘图:
                - 概述: zh/plot2d/index.md
                - Figure Widget: zh/plot2d/figure-widget.md
                - 线条图: zh/plot2d/plot-line.md
                - 数据系列: zh/plot2d/data-series.md
                - 降采样: zh/plot2d/downsampling.md
            - 3D绘图:
                - 概述: zh/plot3d/index.md
            - 开发规范:
                - 概述: zh/dev/index.md
                - Qt集成规范: zh/dev/qt-integration.md
                - 代码风格与注释规范: zh/dev/coding-standards.md
                - PIMPL开发规范: zh/dev/pimpl-dev-guide.md
                - 渲染性能规范: zh/dev/render-guidelines.md
                - 枚举语义转换规范: zh/dev/flag-mapping.md
                - 新节点开发指南: zh/dev/new-node-guide.md
                - 自定义节点: zh/dev/custom-node.md
            - 使用指南:
                - 渲染模式: zh/render-mode.md
            - API参考:
                - C++ API文档: zh/api-reference.md
            - 其它:
                - 性能对比: zh/performance.md
                - 字体: zh/font.md
        - locale: en
          name: English
          build: true
          nav:
            - Overview:
                - Introduction: en/index.md
            - Core Concepts:
                - Render Node: en/render-node.md
                - Object Tree: en/object-tree.md
                - PIMPL Pattern: en/pimpl-pattern.md
                - Signal/Slot: en/signal-slot.md
                - Property System: en/property-system.md
            - 2D Plot:
                - Overview: en/plot2d/index.md
                - Figure Widget: en/plot2d/figure-widget.md
                - Line Plot: en/plot2d/plot-line.md
                - Data Series: en/plot2d/data-series.md
                - Downsampling: en/plot2d/downsampling.md
            - 3D Plot:
                - Overview: en/plot3d/index.md
            - Development Standards:
                - Overview: en/dev/index.md
                - Qt Integration Standards: en/dev/qt-integration.md
                - Coding & Comment Standards: en/dev/coding-standards.md
                - PIMPL Development Guide: en/dev/pimpl-dev-guide.md
                - Render Performance Guidelines: en/dev/render-guidelines.md
                - Flag Mapping Standards: en/dev/flag-mapping.md
                - New Node Development Guide: en/dev/new-node-guide.md
                - Custom Node: en/dev/custom-node.md
            - Usage Guide:
                - Render Mode: en/render-mode.md
            - API Reference:
                - C++ API Docs: en/api-reference.md
            - Others:
                - Performance: en/performance.md
